# @package _global_

model:
  name: minionerec

  # SID mapping generated by RQ-VAE separately, in MiniOneRec item.index.json format.
  sid_file: "Path/to/item.index.json"
  sid_file_item_id_space: recbole
  require_complete_sid_file: true
  allow_duplicate_sid_aliases: false

  # LLM backbone/checkpoint.
  model_name_or_path: "path/to/Qwen2.5-1.5B"
  model_checkpoint_path: null
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: null
  train_from_scratch: false
  freeze_llm: false
  add_sid_tokens: true

  # Original MiniOneRec prompt/data semantics.
  history_max_length: 20
  min_history_length: 1
  max_len: 512
  eval_max_len: 2560
  add_item_alignment_tasks: true
  add_fusion_seqrec_task: true
  item_title_field: title
  item_description_field: description
  fallback_item_text_field: metadata_text

  # Pipeline stage: sft, grpo, or evaluation.
  pipeline_stage: sft
  train_batch_size: 16
  eval_batch_size: 16
  gradient_accumulation_steps: 8
  num_train_epochs: 10
  learning_rate: 3.0e-4
  warmup_steps: 20
  weight_decay: 0.0
  logging_steps: 1
  eval_steps: 0.05
  save_steps: 0.05
  save_total_limit: 1
  group_by_length: false
  gradient_checkpointing: false
  bf16: true
  fp16: false
  optim: adamw_torch
  lr_scheduler_type: cosine
  deepspeed: null
  report_to: none
  dataloader_num_workers: 0
  load_best_model_at_end: true
  early_stopping_patience: 3
  evaluate_after_training: true

  # GRPO RL stage. Kept to the original MiniOneRec path:
  # SID prompts, title/description-to-SID alignment prompts,
  # title-history-to-SID prompts, rule/ranking rewards, and constrained sampling.
  rl_train_batch_size: 64
  rl_eval_batch_size: 128
  rl_gradient_accumulation_steps: 2
  rl_num_train_epochs: 2
  rl_learning_rate: 1.0e-5
  rl_beta: 1.0e-3

  rl_sync_ref_model: true
  rl_temperature: 1.0
  rl_num_generations: 16
  rl_max_completion_length: 128
  rl_max_prompt_length: null
  # Original MiniOneRec rollout leaves history unmasked; set true to align GRPO rollout with RecBole full-eval masking.
  rl_exclude_history: false
  rl_reward_type: ranking
  rl_warmup_ratio: 0.03
  rl_max_grad_norm: 0.3
  rl_eval_steps: 0.0999
  rl_save_steps: 0.1
  rl_save_total_limit: 20
  rl_optim: paged_adamw_32bit
  rl_lr_scheduler_type: cosine
  rl_report_to: none
  rl_add_item_alignment_tasks: true
  rl_add_title_sequence_task: true
  rl_title_sequence_sample_size: 10000
  evaluate_after_rl: false
  num_beams: 50
  max_new_tokens: 64
  length_penalty: 0.0
  topk:
    - 5
    - 10
    - 20
  metrics:
    - recall
    - ndcg
  # RecBole full protocol masks seen items. Set false for original MiniOneRec-style no-history masking.
  exclude_history: true
  constraint_prefix_token_count: null
  constraint_cache_size: 32
  large_eval_warning_threshold: 10000
  save_evaluation_predictions: false
  evaluation_prediction_dir: null
