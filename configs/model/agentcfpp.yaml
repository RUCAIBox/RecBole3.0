# @package _global_

model:
  name: agentcfpp
  history_max_length: 50
  api_model_name: ""
  api_base_url: ""
  api_key_env: ""
  embedding_model: "text-embedding-3-large"
  temperature: 0.7
  temperature_eval: 0.0
  max_tokens_chat: 800
  embedding_dim: 128
  chat_api_batch: 10
  request_retries: 3
  retry_backoff_sec: 20.0
  request_timeout_sec: 120.0
  update_neg_item: false
  domain_list:
    - Books
    - Video_Games
    - Movies_and_TV
  use_intermediate_node: true
  prompt_strategy: "B"
  candidate_num: 10
  match_rule: fuzzy
  has_gt: true
  shuffle_candidates: true
  use_group_memory: false
  group_n_cluster: 384
  group_num_groups: 10
  group_mem_length: 5
  record_path: outputs/agentcfpp_records
  save_agent_state: true
  load_agent_state_path: ""
  group_state_path: ""

trainer:
  batch_size: 20
  shuffle: false
  dataloader_num_workers: 0
  max_epochs: 1
  mrr_ks: [1, 5, 10]
  eval:
    protocol: full
    metrics:
      - name: ndcg
        ks: [1, 5, 10]
      - name: recall
        ks: [1, 5, 10]
    neg_sampling_num: 0
    candidate_seed: 42
