# @package _global_

model:
  name: rearec
  backbone: sasrec

  # --- SASRec Transformer ---
  history_max_length: 50
  embedding_dim: 256
  num_layers: 2
  num_heads: 2
  inner_size: 300
  hidden_act: gelu
  layer_norm_eps: 1.0e-12
  dropout: 0.5
  initializer_range: 0.02

  # --- ReaRec reasoning ---
  learning_strategy: prl   # erl or prl
  reason_step: 2
  temperature: 0.07

  # --- Loss function ---
  loss_type: auto      # auto / ce / sampled_softmax
  num_negatives: 128   # negative samples per positive (sampled_softmax only)

  # --- ERL-specific ---
  kl_weight: 0.05

  # --- PRL-specific ---
  pl_weight: 1.0
  temp_scale: 5.0
  noise_factor: 0.01
  cl_weight: 1.0
  warmup_epochs: 0

  # --- HSTU backbone (only used when backbone: hstu) ---
  # Uncomment and tune when switching to backbone: hstu.
  # Requires fbgemm-gpu and a dataset with timestamps.
  # attention_dim: 32
  # linear_hidden_dim: 32
  # input_dropout_rate: 0.0
  # attn_dropout_rate: 0.0
  # linear_dropout_rate: 0.0
  # num_time_buckets: 128

dataset:
  metadata_mode: fields
  download_source: huggingface

trainer:
  batch_size: 512
  shuffle: true
  monitor: ndcg@10
  max_epochs: 10
  early_stopping:
    enabled: true
    patience: 2
    min_delta: 0.001
  checkpoint:
    save_best: true
  optimizer:
    name: Adam
    kwargs:
      lr: 0.001
  eval:
    protocol: full
    exclude_history: true
    metrics:
      - name: recall
        ks: [5, 10, 20]
      - name: ndcg
        ks: [5, 10, 20]
