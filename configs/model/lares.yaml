# @package _global_

model:
  name: lares
  history_max_length: 20
  n_pre_layers: 2
  n_core_layers: 2
  n_heads: 2
  hidden_size: 64
  inner_size: 256
  hidden_dropout_prob: 0.5
  attn_dropout_prob: 0.5
  hidden_act: gelu
  layer_norm_eps: 1.0e-12
  initializer_range: 0.02
  mean_recurrence: 3
  state_init_method: normal
  state_std: 1.0
  state_scale: 3.0
  sampling_scheme: poisson-lognormal
  test_recurrence_ratios: [0.25, 0.5, 1, 2]
  adapter_type: add
  tau: 1.0
  alpha: 0.2
  gamma: 0.1
  sem_func: dot
  same_step: true
  stage: SL

  # RL-specific hyperparameters
  k: 10
  beta: 1.0
  group_num: 4
  reward_metric: recall
  pretrain_model_path: null

trainer:
  batch_size: 256
  shuffle: true
  monitor: ndcg@10
  max_epochs: 100
  eval_steps: 1
  checkpoint:
    save_best: true
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.0
  optimizer:
    name: AdamW
    kwargs:
      lr: 0.001
  eval:
    protocol: full
    exclude_history: false
    metrics:
      - name: recall
        ks: [5, 10]
      - name: ndcg
        ks: [5, 10]
