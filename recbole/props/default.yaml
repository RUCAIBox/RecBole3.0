num_proc: 4
cache_dir: cache/       # Usually for raw and processed data
log_dir: logs/
tensorboard_log_dir: tensorboard/
ckpt_dir: ckpt/
run_id: hstu  # Change this to your customized run id
seed: 2020
reproducibility: True
metric_decimal_places: 4
num_workers: 8

gpu_id: 0
train_batch_size: 1024
eval_batch_size: 1024
max_item_seq_len: 20
lr: 0.001
weight_decay: 0.0
warmup_steps: 0
steps: ~
epochs: 300
max_grad_norm: 1.0      # None for no clipping, else a float value
eval_interval: 1        # Evaluate every n epochs
patience: 10            # Early stopping. Stop training after n epochs without improvement. Set to None to disable

topk: [5,10]
metrics: [ndcg,recall]
val_metric: ndcg@10
